name: QA Agent Automation Tests

on:
  push:
    paths:
      - "qa-agent-automation/**"
      - ".github/workflows/qa-agent-automation-tests.yml"
  pull_request:
    paths:
      - "qa-agent-automation/**"
      - ".github/workflows/qa-agent-automation-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qa-agent-automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
