name: WSOP Player Crawler Self Test

on:
  push:
    paths:
      - "WSOP-Player-Standings-Crawler-Improved/**"
      - ".github/workflows/wsop-player-crawler-self-test.yml"
  pull_request:
    paths:
      - "WSOP-Player-Standings-Crawler-Improved/**"
      - ".github/workflows/wsop-player-crawler-self-test.yml"

jobs:
  self-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WSOP-Player-Standings-Crawler-Improved

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: WSOP-Player-Standings-Crawler-Improved/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run crawler self-test
        run: npm run crawl:self-test
